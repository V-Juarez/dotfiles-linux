# Get editor completions based on the config schema
#"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

# Replace the "ŌØ»" symbol in the prompt with "Ō×£"
# [character] # The name of the module we are configuring is "character"
# success_symbol = "[’īā Ō×£](bold blue)" # The "success_symbol" segment is being set to "Ō×£" with the color "bold green"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[username]
style_user = "blue bold"
style_root = "red bold"
show_always = false

[sudo]
style = "bold red"
symbol = "’ī× "
disabled = false

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$nodejs\
$cmd_duration $jobs $time\
$line_break\
$character"""

[nodejs]
# format = "[ $symbol($version )]($style)"
format = "[ ŅĪģ ($version)](bold green) "

[fill]
symbol = ""

[directory]
home_symbol = "¾░īĮ ~"
style = "blue"
# read_only = " Ņéó"
read_only = " ’ĆŻ "
truncation_length = 5
truncate_to_repo = false

[character]
success_symbol = "[ ’īā ](blue)[ŌØ»](white)[ŌØ»](red)[ŌØ»](yellow)"
error_symbol = "[ Ņ»å ](red)[ŌØ»](orange)[ŌØ»](red)[ŌØ»](orange)"
vicmd_symbol = "[ ’ī¦  ](green)[ŌØ»](green)[ŌØ»](yellow)[ŌØ»](purple)"
#error_symbol = "[ ’īā ŌØ»](red)"
#vicmd_symbol = "[ ’īā ŌØ«](green)"

[git_branch]
symbol = "Ņ¬ä  "
format = "on [$symbol$branch]($style) "
style = "bold purple"
# truncation_length = 4
# truncation_symbol = "ŌĆ”/"
only_attached = false

[git_commit]
commit_hash_length = 7
format = '[\\($hash$tag\\)]($style) '  # Escapar los par├®ntesis con \\
style = "bold green"
only_detached = true
tag_disabled = false
tag_symbol = " ­¤ÅĘ "

[jobs]
symbol = "Ņ┤® "
style = "bold red"
number_threshold = 1
format = "[$symbol]($style)"

# [git_status]
# format = '([\[$all_status$ahead_behind\]]($style) )'
# style = "cyan"

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = "bold cyan"
conflicted = "Ņ»” "
up_to_date = "’üØ  "
untracked = "ŅÖö "
ahead = "ŌćĪ ${count}"
diverged = "ŌćĢ ŌćĪ${ahead_count}ŌćŻ${behind_count}"
behind = "ŌćŻ ${count}"
stashed = "’ö× "
modified = "¾▒”╣ "
staged = '[¾▒ĢŻ \($count\)](green)'
renamed = "¾░æĢ "
deleted = "¾░║Ø "

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"
# format = '[\($state( $progress_current of $progress_total)\)]($style) '
# style = "bold yellow"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

[cmd_duration]
format = "[$duration]($style)"
style = "yellow"

[memory_usage]
symbol = "Ņ┐ģ "

[rust]
symbol = "Ņ×© "

