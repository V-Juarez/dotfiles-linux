-- Conky con Rings Lua - Tema Cyberpunk
-- ~/.config/conky/lua-rings/conky-rings.conf

conky.config = {
    -- Ventana
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    
    -- Posición
    alignment = 'top_right',
    gap_x = 30,
    gap_y = 60,
    minimum_width = 240,
    minimum_height = 700,
    
    -- Actualización
    update_interval = 1.0,
    cpu_avg_samples = 2,
    
    -- Texto
    use_xft = true,
    font = 'JetBrains Mono:size=10',
    xftalpha = 0.9,
    override_utf8_locale = true,
    
    -- Colores (Catppuccin)
    default_color = 'cdd6f4',
    color1 = '89b4fa',  -- Azul (CPU)
    color2 = 'a6e3a1',  -- Verde (RAM)
    color3 = 'f38ba8',  -- Rojo (Disk)
    color4 = 'f9e2af',  -- Amarillo (Net)
    color5 = 'b4befe',  -- Lavanda
    
    -- Gráficos
    draw_borders = false,
    draw_graph_borders = false,
    draw_outline = false,
    draw_shades = false,
    
    -- Rendimiento
    background = false,
    double_buffer = true,
    no_buffers = true,
    
    -- Lua
    lua_load = '~/.config/conky/lua-rings/rings.lua',
    lua_draw_hook_post = 'rings',
}

conky.text = [[
${voffset 20}
${alignc}${color1}${font JetBrains Mono:bold:size=14}SYSTEM${font}${color}

${voffset 40}
${goto 35}${color1}${font JetBrains Mono:bold:size=11}CPU${font}${color}
${goto 35}${color1}${cpu cpu0}%${color}
${goto 35}${color5}${freq_g} GHz${color}
${goto 35}${hwmon 1 temp 1}°C

${voffset 90}
${goto 35}${color2}${font JetBrains Mono:bold:size=11}RAM${font}${color}
${goto 35}${color2}${memperc}%${color}
${goto 35}${color5}${mem}${color}
${goto 35}${memmax}

${voffset 90}
${goto 35}${color3}${font JetBrains Mono:bold:size=11}DISK${font}${color}
${goto 35}${color3}${fs_used_perc /}%${color}
${goto 35}${color5}${fs_used /}${color}
${goto 35}${fs_size /}

${voffset 90}
${goto 35}${color4}${font JetBrains Mono:bold:size=11}NET${font}${color}
${goto 35}${color4}${downspeed wlan0}${color}
${goto 35}${color5}${upspeed wlan0}${color}
${goto 35}${addr wlan0}

${voffset 30}
${alignc}${color5}${font JetBrains Mono:size=8}${time %A, %d %B %Y}${font}${color}
${alignc}${color1}${font JetBrains Mono:bold:size=20}${time %H:%M}${font}${color}
${alignc}${color5}${uptime}${color}
]]
