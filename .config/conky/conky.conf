-- Conky optimizado para monitor 24" (1920x1080)
-- Dell Precision T3610 - Xeon - GTX 970
-- ~/.config/conky/conky-24inch.conf

conky.config = {
    -- Ventana
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 200,
    own_window_colour = '11111b',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    
    -- Posición y tamaño ajustados
    alignment = 'top_right',
    gap_x = 20,
    gap_y = 50,  -- Reducido para que quepa en pantalla
    minimum_width = 280,  -- Ancho reducido
    maximum_width = 280,
    minimum_height = 950,  -- Altura máxima para 1080p
    
    -- Actualización
    update_interval = 2.0,
    cpu_avg_samples = 2,
    net_avg_samples = 2,
    
    -- Texto
    use_xft = true,
    font = 'JetBrains Mono:size=8',  -- Fuente más pequeña
    xftalpha = 1.0,
    override_utf8_locale = true,
    
    -- Colores Catppuccin
    default_color = 'cdd6f4',
    color0 = '11111b',
    color1 = '89b4fa',  -- Azul
    color2 = 'a6e3a1',  -- Verde
    color3 = 'f38ba8',  -- Rojo
    color4 = 'f9e2af',  -- Amarillo
    color5 = 'b4befe',  -- Lavanda
    color6 = 'fab387',  -- Naranja
    
    -- Bordes
    draw_borders = true,
    border_width = 2,
    border_inner_margin = 12,  -- Márgenes reducidos
    border_outer_margin = 0,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    
    -- Rendimiento
    background = false,
    double_buffer = true,
    no_buffers = true,
}

conky.text = [[
${alignc}${color1}${font JetBrains Mono:bold:size=11}SYSTEM${font}${color}

${color1}┌─ INFO ────────────────────┐${color}
${color5}│${color} ${color8}${nodename}${color}
${color5}│${color} ${color8}${kernel}${color}
${color5}│${color} ${color8}${uptime_short}${color}
${color1}└───────────────────────────┘${color}

${color1}┌─ CPU ─────────────────────┐${color}
${color5}│${color} ${color1}${cpugraph 30,250 89b4fa 89b4fa -t}${color}
${color5}│${color} ${color1}${cpu cpu0}%${color} ${cpubar 6,200}
${color5}│${color} ${color8}${freq_g} GHz  ${hwmon 0 temp 1}°C${color}
${color5}│${color} C1 ${cpu cpu1}% ${cpubar cpu1 5,150}
${color5}│${color} C2 ${cpu cpu2}% ${cpubar cpu2 5,150}
${color5}│${color} C3 ${cpu cpu3}% ${cpubar cpu3 5,150}
${color5}│${color} C4 ${cpu cpu4}% ${cpubar cpu4 5,150}
${color1}└───────────────────────────┘${color}

${color2}┌─ MEMORY ──────────────────┐${color}
${color5}│${color} ${color2}${memgraph 30,250 a6e3a1 a6e3a1 -t}${color}
${color5}│${color} ${color2}${memperc}%${color} ${membar 6,200}
${color5}│${color} ${color8}${mem} / ${memmax}${color}
${color2}└───────────────────────────┘${color}

${color3}┌─ DISK ────────────────────┐${color}
${color5}│${color} / ${color3}${fs_used_perc /}%${color} ${fs_bar 5,165 /}
${color5}│${color} ${color8}${fs_used /} / ${fs_size /}${color}
${color3}└───────────────────────────┘${color}

${color4}┌─ NETWORK ─────────────────┐${color}
${color5}│${color} ${color8}${addr eth0}${color}
${color5}│${color} ${color2}↓${color} ${downspeed eth0} ${color3}↑${color} ${upspeed eth0}
${color5}│${color} ${downspeedgraph eth0 25,115 a6e3a1 a6e3a1 -t} ${upspeedgraph eth0 25,115 f38ba8 f38ba8 -t}
${color4}└───────────────────────────┘${color}

${color6}┌─ GPU (GTX 970) ───────────┐${color}
${color5}│${color} Temp: ${color6}${nvidia temp}°C${color}
${color5}│${color} Usage: ${color6}${nvidia gpuutil}%${color}
${color5}│${color} VRAM: ${color6}${nvidia memutil}%${color}
${color6}└───────────────────────────┘${color}

${color6}┌─ TOP ─────────────────────┐${color}
${color5}│${color} ${top name 1}${alignr}${color1}${top cpu 1}%${color}
${color5}│${color} ${top name 2}${alignr}${color1}${top cpu 2}%${color}
${color5}│${color} ${top name 3}${alignr}${color1}${top cpu 3}%${color}
${color6}└───────────────────────────┘${color}

${alignc}${color1}${font JetBrains Mono:bold:size=18}${time %H:%M}${font}${color}
${alignc}${color8}${font JetBrains Mono:size=7}${time %A, %d %B}${font}${color}
]]
