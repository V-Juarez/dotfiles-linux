# Configuración de Picom para Qtile
# ~/.config/picom/picom.conf

#################################
#          Sombras              #
#################################

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.75;
shadow-offset-x = -12;
shadow-offset-y = -12;

# Excluir sombras en ventanas específicas
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'firefox' && argb",
];

#################################
#          Fade (Desvanecimiento)#
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# Excluir fade en ventanas específicas
fade-exclude = [];

#################################
#      Transparencia/Opacidad   #
#################################

inactive-opacity = 0.95;
frame-opacity = 0.9;
inactive-opacity-override = false;

# Opacidad específica por ventana
opacity-rule = [
    "100:class_g = 'firefox'",
    "100:class_g = 'Brave-browser'",
    "95:class_g = 'Alacritty'",
    "95:class_g = 'kitty'",
    "90:class_g = 'Rofi'",
    "100:class_g = 'discord'",
    "100:class_g = 'Spotify'",
];

#################################
#       Esquinas redondeadas    #
#################################

corner-radius = 10;

# Excluir bordes redondeados
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
];

#################################
#          Blur (Difuminado)    #
#################################

blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

# Excluir blur
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'slop'",
];

#################################
#       Configuración General   #
#################################

backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
log-level = "warn";

# Tipo de ventanas
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.95; focus = true; full-shadow = false; };
    dock = { shadow = false; clip-shadow-above = true; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; shadow = true; };
    dropdown_menu = { opacity = 0.95; shadow = true; };
};

#################################
#         Animaciones           #
#################################

# Transiciones suaves
transition-length = 300;
transition-pow-x = 0.1;
transition-pow-y = 0.1;
transition-pow-w = 0.1;
transition-pow-h = 0.1;
size-transition = true;

#################################
#      Configuración Avanzada   #
#################################

# GLX backend (mejor rendimiento)
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;

# Experimental (descomentar si tienes problemas)
# xrender-sync-fence = true;
# unredir-if-possible = true;
