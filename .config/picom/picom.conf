# Configuración de Picom sin warnings (actualizada)
# ~/.config/picom/picom.conf

#################################
#          Sombras              #
#################################

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.15;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.5;
shadow-green = 0.01;

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c",
];

#################################
#          Fade                 #
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

#################################
#      Transparencia            #
#################################

inactive-opacity = 0.88;
frame-opacity = 0.4;
inactive-opacity-override = false;

opacity-rule = [
    "90:class_g = 'firefox'",
    "20:class_g = 'zen-browser'",
    "20:class_g = 'Brave-browser'",
    "85:class_g = 'Alacritty'",
    "15:class_g = 'ghostty'",
    "85:class_g = 'kitty'",
    "80:class_g = 'Rofi'",
    "50:class_g = 'discord'",
    "25:class_g = 'visual-studio-code'",
    "6:class_g = 'spotify'",
    "6:class_g = 'conky'",
];

#################################
#       Esquinas redondeadas    #
#################################

corner-radius = 8;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
];

#################################
#          Blur                 #
#################################

blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'slop'",
];

#################################
#       Backend                 #
#################################

backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
log-level = "warn";

# Opciones GLX actualizadas (sin deprecados)
# NO usar: glx-no-stencil, glx-no-rebind-pixmap, glx-swap-method

#################################
#         Tipos de ventanas     #
#################################

wintypes:
{
    tooltip = { 
        fade = true; 
        shadow = true; 
        opacity = 0.45; 
        focus = true; 
        full-shadow = false; 
    };
    dock = { 
        shadow = false; 
        clip-shadow-above = true; 
    };
    dnd = { 
        shadow = false; 
    };
    popup_menu = { 
        opacity = 0.75; 
        shadow = true; 
    };
    dropdown_menu = { 
        opacity = 0.85; 
        shadow = true; 
    };
};
