# Configuración Ultra de Picom (requiere picom-git)
# ~/.config/picom/picom-ultra.conf

#################################
#       Animaciones Avanzadas   #
#################################

# Animaciones al abrir ventanas
animations = true;
animation-stiffness = 200;
animation-window-mass = 0.5;
animation-dampening = 20;
animation-clamping = false;

animation-for-open-window = "zoom";
animation-for-unmap-window = "slide-down";
animation-for-menu-window = "slide-up";
animation-for-transient-window = "slide-down";

#################################
#          Sombras Avanzadas    #
#################################

shadow = true;
shadow-radius = 15;
shadow-opacity = 0.8;
shadow-offset-x = -15;
shadow-offset-y = -15;

shadow-red = 0.0;
shadow-green = 0.0;
shadow-blue = 0.0;

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c",
];

#################################
#          Fade Suave           #
#################################

fading = true;
fade-in-step = 0.028;
fade-out-step = 0.028;
fade-delta = 8;

#################################
#      Transparencia Dinámica   #
#################################

inactive-opacity = 0.9;
frame-opacity = 0.9;
inactive-opacity-override = false;
active-opacity = 1.0;

focus-exclude = [
    "class_g = 'Cairo-clock'",
    "class_g = 'slop'",
];

opacity-rule = [
    "100:class_g = 'firefox'",
    "100:class_g = 'Brave-browser'",
    "90:class_g = 'Alacritty' && focused",
    "80:class_g = 'Alacritty' && !focused",
    "95:class_g = 'kitty'",
    "85:class_g = 'Rofi'",
    "100:class_g = 'discord'",
    "100:class_g = 'Spotify'",
    "100:class_g = 'vlc'",
    "90:class_g = 'Thunar'",
];

#################################
#    Esquinas Ultra Redondeadas #
#################################

corner-radius = 15;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
    "class_g = 'Dunst'",
];

#################################
#       Blur Gaussiano Fuerte   #
#################################

blur-method = "dual_kawase";
blur-strength = 8;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur-kern = "3x3box";

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'slop'",
];

#################################
#       Backend Optimizado      #
#################################

backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;
log-level = "info";

# GLX backend
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

#################################
#         Tipos de Ventanas     #
#################################

wintypes:
{
    tooltip = { 
        fade = true; 
        shadow = true; 
        opacity = 0.95; 
        focus = true; 
        full-shadow = false; 
    };
    dock = { 
        shadow = false; 
        clip-shadow-above = true; 
    };
    dnd = { 
        shadow = false; 
    };
    popup_menu = { 
        opacity = 0.95; 
        shadow = true;
        fade = true;
    };
    dropdown_menu = { 
        opacity = 0.95; 
        shadow = true; 
        fade = true;
    };
    normal = {
        fade = true;
        shadow = true;
    };
};
