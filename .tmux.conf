# Cambiar prefijo a Ctrl+a
#
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Activar mouse
set -g mouse on
# style
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

set -g set-clipboard on
set -g mouse on
set -g status-position top
set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=default"
set -g status-left "#[fg=${green_soft},bold] #S #[fg=${gray_light}, nobold] 󰯉  "
set -g status-right "󱎃 #{cpu} 󰓅  #{mem}"
set -g window-status-current-format "#[fg=${cyan_soft},bold] 󰫢 #[underscore] #I:#W"
set -g window-status-format " #I:#W"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${blue_muted}"


# preview  image
set -gq allow-passthrough on
set -g visual-activity off

# Resurrect
set -g @resurrect-capture-pane-contents 'on'

bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windo in same path
bind c new-window -c "#{pane_current_path}"

# use vim arrow keys to reize
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5
bind -r m resize-pane -Z

# Enable vi mode to allow vim movements
set-window-option -g mode-keys vi

# Start selecting text with 'v'
bind-key -T copy-mode-vi 'v' send -x begin-selection

# Copy text with 'y'
bind-key -T copy-mode-vi 'y' send-keys -x copy-pipe-and-cancel "xclip -selection clipboard"


unbind -T copy-mode-vi MouseDragEnd1Pane
# Mejorar colores
set -g default-terminal "screen-256color"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g @resurrect-capture-pane-contents 'on'
set -g @tmux-continuum-restore 'on'

# Recargar config con r
bind r source-file ~/.tmux.conf \; display-message "Config recargada"

run '~/.tmux/plugins/tpm/tpm'
